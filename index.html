<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #10181f;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --primary: #00b7af;
            --primary-hover: #00968f;
            --secondary: #64748b;
            --secondary-hover: #f1f5f9;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --danger: #ef4444;
            --danger-hover: #fee2e2;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --card-border: #334155;
            --primary: #00b7af;
            --secondary: #94a3b8;
            --secondary-hover: #334155;
            --modal-bg: rgba(0, 0, 0, 0.75);
            --danger: #f87171;
            --danger-hover: rgba(239, 68, 68, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        .search-container svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
        }

        #searchInput {
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 300px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 183, 175, 0.2);
        }

        #themeToggle {
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            cursor: pointer;
            padding: 0.6rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #themeToggle:hover {
            background: var(--secondary-hover);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .add-note-section {
            display: flex;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .add-note-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .add-note-container.active {
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            border-color: var(--card-border);
        }

        #noteInput {
            width: 100%;
            border: none;
            padding: 1.2rem;
            font-size: 1.05rem;
            background: transparent;
            color: var(--text-color);
            resize: none;
            overflow: hidden;
            min-height: 55px;
            line-height: 1.5;
        }

        #noteInput:focus {
            outline: none;
        }

        .add-note-footer {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.2rem;
        }

        .add-note-container.active .add-note-footer {
            display: flex;
        }

        .add-note-hint {
            font-size: 0.8rem;
            color: var(--secondary);
        }

        #addNoteBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #addNoteBtn:hover {
            background: var(--primary-hover);
        }

        .section-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            margin-bottom: 1rem;
            margin-top: 2rem;
            font-weight: 600;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        .note-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            min-height: 160px;
            transition: box-shadow 0.2s, transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .note-card:hover {
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }

        .note-content {
            flex-grow: 1;
            margin-bottom: 1rem;
            font-size: 1.05rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .note-date {
            color: var(--secondary);
            font-size: 0.8rem;
        }

        .note-actions {
            display: flex;
            gap: 0.2rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .note-card:hover .note-actions {
            opacity: 1;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--secondary);
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--secondary-hover);
            color: var(--text-color);
        }

        .action-btn.delete-btn:hover {
            color: var(--danger);
            background: var(--danger-hover);
        }

        .action-btn.pin-btn.active {
            color: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        #editNoteInput {
            width: 100%;
            border: none;
            padding: 1.5rem;
            font-size: 1.1rem;
            background: transparent;
            color: var(--text-color);
            resize: none;
            min-height: 300px;
            flex-grow: 1;
            line-height: 1.6;
        }

        #editNoteInput:focus {
            outline: none;
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--card-border);
            background: var(--card-bg);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        #closeEditBtn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #closeEditBtn:hover {
            opacity: 0.9;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--secondary);
            padding: 4rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            color: var(--text-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
                padding: 1rem;
            }
            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
            .search-container {
                flex-grow: 1;
                margin-right: 1rem;
            }
            #searchInput {
                width: 100%;
            }
            main {
                padding: 1rem;
            }
            .note-actions {
                opacity: 1; /* Always show on mobile */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
            Quick Notes
        </h1>
        <div class="header-actions">
            <div class="search-container">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search notes...">
            </div>
            <button id="themeToggle" aria-label="Toggle theme" title="Toggle Dark Mode">
                <svg id="moonIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sunIcon" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </header>

    <main>
        <section class="add-note-section">
            <div class="add-note-container" id="addNoteContainer">
                <textarea id="noteInput" placeholder="Take a note..." rows="1"></textarea>
                <div class="add-note-footer">
                    <span class="add-note-hint">Press <strong>Enter</strong> to save</span>
                    <button id="addNoteBtn">Add Note</button>
                </div>
            </div>
        </section>

        <section class="notes-section">
            <h2 id="pinnedHeader" class="section-header" style="display: none;">Pinned</h2>
            <div id="pinnedNotesGrid" class="notes-grid"></div>

            <h2 id="othersHeader" class="section-header" style="display: none;">Others</h2>
            <div id="notesGrid" class="notes-grid"></div>
        </section>
    </main>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content" id="modalContent">
            <textarea id="editNoteInput" placeholder="Note content..."></textarea>
            <div class="modal-footer">
                <span id="editNoteTime" class="note-date"></span>
                <button id="closeEditBtn">Close</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const addNoteContainer = document.getElementById('addNoteContainer');
        const noteInput = document.getElementById('noteInput');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const notesGrid = document.getElementById('notesGrid');
        const pinnedNotesGrid = document.getElementById('pinnedNotesGrid');
        const pinnedHeader = document.getElementById('pinnedHeader');
        const othersHeader = document.getElementById('othersHeader');
        const searchInput = document.getElementById('searchInput');
        const themeToggle = document.getElementById('themeToggle');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');
        const modal = document.getElementById('editModal');
        const editNoteInput = document.getElementById('editNoteInput');
        const closeEditBtn = document.getElementById('closeEditBtn');
        const editNoteTime = document.getElementById('editNoteTime');

        // State
        let notes = JSON.parse(localStorage.getItem('quick_notes_data')) || [];
        let editingNoteId = null;

        // SVG Icons
        const icons = {
            pinOutline: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"></path><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"></path></svg>`,
            pinFilled: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"></path><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"></path></svg>`,
            trash: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>`,
            emptyBox: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>`
        };

        // Init
        function init() {
            renderNotes();

            // Theme setup
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        // Auto Resize Textareas
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        noteInput.addEventListener('input', function() {
            autoResize(this);
        });

        editNoteInput.addEventListener('input', function() {
            autoResize(this);
            autoSaveEdit(); // Auto-save while typing
        });

        // Input container interactions
        noteInput.addEventListener('focus', () => {
            addNoteContainer.classList.add('active');
        });

        document.addEventListener('click', (e) => {
            if (!addNoteContainer.contains(e.target) && e.target !== addNoteBtn) {
                if (noteInput.value.trim() === '') {
                    addNoteContainer.classList.remove('active');
                    noteInput.style.height = 'auto';
                }
            }
        });

        // Adding Notes
        addNoteBtn.addEventListener('click', addNote);

        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addNote();
            }
        });

        function addNote() {
            const text = noteInput.value.trim();
            if (text) {
                const newNote = {
                    id: Date.now().toString(),
                    text: text,
                    createdAt: new Date().toISOString(),
                    pinned: false
                };
                notes.unshift(newNote);
                saveNotes();
                renderNotes(searchInput.value);

                // Reset input
                noteInput.value = '';
                addNoteContainer.classList.remove('active');
                noteInput.style.height = 'auto';
            }
        }

        function saveNotes() {
            localStorage.setItem('quick_notes_data', JSON.stringify(notes));
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const isToday = date.getDate() === today.getDate() &&
                            date.getMonth() === today.getMonth() &&
                            date.getFullYear() === today.getFullYear();

            if (isToday) {
                return 'Today, ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            return date.toLocaleDateString([], {month: 'short', day: 'numeric'}) + ', ' +
                   date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        // Rendering Notes
        function renderNotes(filterText = '') {
            const searchLower = filterText.toLowerCase();
            const filteredNotes = notes.filter(n => n.text.toLowerCase().includes(searchLower));

            const pinned = filteredNotes.filter(n => n.pinned);
            const unpinned = filteredNotes.filter(n => !n.pinned);

            pinnedNotesGrid.innerHTML = '';
            notesGrid.innerHTML = '';

            // Render Pinned
            if (pinned.length > 0) {
                pinnedHeader.style.display = 'block';
                othersHeader.style.display = unpinned.length > 0 ? 'block' : 'none';
                pinned.forEach(n => pinnedNotesGrid.appendChild(createNoteElement(n)));
            } else {
                pinnedHeader.style.display = 'none';
                othersHeader.style.display = 'none';
            }

            // Render Others
            if (unpinned.length > 0) {
                if (pinned.length > 0) othersHeader.style.display = 'block';
                unpinned.forEach(n => notesGrid.appendChild(createNoteElement(n)));
            }

            // Empty State
            if (filteredNotes.length === 0) {
                othersHeader.style.display = 'none';
                pinnedHeader.style.display = 'none';
                notesGrid.innerHTML = `
                    <div class="empty-state">
                        ${icons.emptyBox}
                        <p>${filterText ? 'No matching notes found.' : 'Your notes will appear here.'}</p>
                    </div>
                `;
            }
        }

        function createNoteElement(note) {
            const div = document.createElement('div');
            div.className = 'note-card';
            div.onclick = () => openEditModal(note);

            const content = document.createElement('div');
            content.className = 'note-content';
            content.textContent = note.text;

            const footer = document.createElement('div');
            footer.className = 'note-footer';

            const dateSpan = document.createElement('span');
            dateSpan.className = 'note-date';
            dateSpan.textContent = formatDate(note.createdAt);

            const actions = document.createElement('div');
            actions.className = 'note-actions';

            const pinBtn = document.createElement('button');
            pinBtn.className = `action-btn pin-btn ${note.pinned ? 'active' : ''}`;
            pinBtn.innerHTML = note.pinned ? icons.pinFilled : icons.pinOutline;
            pinBtn.title = note.pinned ? 'Unpin note' : 'Pin note';
            pinBtn.onclick = (e) => {
                e.stopPropagation();
                togglePin(note.id);
            };

            const delBtn = document.createElement('button');
            delBtn.className = 'action-btn delete-btn';
            delBtn.innerHTML = icons.trash;
            delBtn.title = 'Delete note';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                deleteNote(note.id);
            };

            actions.appendChild(pinBtn);
            actions.appendChild(delBtn);

            footer.appendChild(dateSpan);
            footer.appendChild(actions);

            div.appendChild(content);
            div.appendChild(footer);

            return div;
        }

        function togglePin(id) {
            const noteIndex = notes.findIndex(n => n.id === id);
            if (noteIndex !== -1) {
                notes[noteIndex].pinned = !notes[noteIndex].pinned;
                saveNotes();
                renderNotes(searchInput.value);
            }
        }

        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(n => n.id !== id);
                saveNotes();
                renderNotes(searchInput.value);
            }
        }

        // Edit Modal
        function openEditModal(note) {
            editingNoteId = note.id;
            editNoteInput.value = note.text;
            editNoteTime.textContent = 'Created: ' + formatDate(note.createdAt);

            modal.classList.add('active');

            // Allow modal transition to complete before focusing and resizing
            setTimeout(() => {
                editNoteInput.focus();
                // Put cursor at the end
                editNoteInput.selectionStart = editNoteInput.selectionEnd = editNoteInput.value.length;
                autoResize(editNoteInput);
            }, 50);
        }

        function autoSaveEdit() {
            if (editingNoteId) {
                const note = notes.find(n => n.id === editingNoteId);
                if (note && note.text !== editNoteInput.value) {
                    note.text = editNoteInput.value;
                    saveNotes();
                    renderNotes(searchInput.value);
                }
            }
        }

        function closeEditModal() {
            autoSaveEdit();

            // If the note was emptied out during edit, remove it
            const note = notes.find(n => n.id === editingNoteId);
            if (note && !note.text.trim()) {
                notes = notes.filter(n => n.id !== editingNoteId);
                saveNotes();
                renderNotes(searchInput.value);
            }

            editingNoteId = null;
            modal.classList.remove('active');
        }

        closeEditBtn.addEventListener('click', closeEditModal);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeEditModal();
            }
        });

        // Escape to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeEditModal();
            }
        });

        // Search
        searchInput.addEventListener('input', (e) => {
            renderNotes(e.target.value);
        });

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'light') {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            } else {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            }
        }

        // Start
        init();
    </script>
</body>
</html>
